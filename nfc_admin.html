<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ZipLink — NFC Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f5f7;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 440px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.header {
  text-align: center;
  margin-bottom: 28px;
}
.logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #1d1d1f; }
.subtitle { font-size: 14px; color: #6e6e73; margin-top: 4px; }
.conn-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 4px 12px;
  background: #f0faf4;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: #1a7f4b;
}
.conn-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; }

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #6e6e73;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 7px;
}
input[type="text"], input[type="password"], input[type="date"], input[type="time"] {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e0e0e5;
  border-radius: 10px;
  font-size: 15px;
  color: #1d1d1f;
  background: #fff;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #0071e3; }
input:disabled { background: #f5f5f7; color: #aeaeb2; }

.date-row { display: flex; gap: 10px; }
.date-row input[type="date"] { flex: 2; }
.date-row input[type="time"] { flex: 1; }

.port-group { display: flex; gap: 8px; }
.port-btn {
  flex: 1;
  padding: 10px 0;
  border: 1.5px solid #e0e0e5;
  border-radius: 10px;
  background: #fff;
  font-size: 15px;
  font-weight: 500;
  color: #6e6e73;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.port-btn:hover { border-color: #0071e3; color: #0071e3; }
.port-btn.active {
  background: #0071e3;
  border-color: #0071e3;
  color: #fff;
}

.btn-primary {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: #0071e3;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
  margin-top: 4px;
}
.btn-primary:hover   { background: #0077ed; }
.btn-primary:active  { background: #006cce; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }
.btn-primary.green { background: #34c759; }
.btn-primary.green:hover { background: #30b350; }

.btn-secondary {
  width: 100%;
  padding: 11px;
  border: 1.5px solid #e0e0e5;
  border-radius: 12px;
  background: transparent;
  color: #6e6e73;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: #aeaeb2; color: #1d1d1f; }

.divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }

/* Status steps */
.steps { display: none; }
.step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  font-size: 14px;
  color: #aeaeb2;
  border-bottom: 1px solid #f5f5f7;
  transition: color 0.2s;
}
.step:last-child { border-bottom: none; }
.step.active { color: #1d1d1f; }
.step.done   { color: #34c759; }
.step.error  { color: #ff3b30; }
.step-icon {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  background: #f5f5f7;
  color: #aeaeb2;
  font-weight: 600;
  transition: all 0.2s;
}
.step.active .step-icon { background: #e8f0fe; color: #0071e3; }
.step.done   .step-icon { background: #e9f9ee; color: #34c759; }
.step.error  .step-icon { background: #ffeeed; color: #ff3b30; }

.result-box {
  margin-top: 16px;
  padding: 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.5;
  display: none;
}
.result-box.success { background: #f0faf4; color: #1a7f4b; }
.result-box.error   { background: #fff2f2; color: #ff3b30; }

.uid-display {
  font-family: "SF Mono", monospace;
  font-size: 12px;
  margin-top: 4px;
  opacity: 0.8;
}

.spinner {
  width: 12px; height: 12px;
  border: 2px solid #0071e3;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">ZipLink</div>
    <div class="subtitle">NFC Adminverktyg</div>
    <div id="conn-badge" class="conn-badge hidden">
      <div class="conn-dot"></div>Ansluten
    </div>
  </div>

  <!-- Key field (always visible, disabled when connected) -->
  <div class="field">
    <label>Nyckel (HASH_KEY_UPD)</label>
    <input type="password" id="key-input" placeholder="Klistra in nyckeln här…" autocomplete="off">
  </div>

  <!-- Connect button -->
  <div id="section-connect">
    <button class="btn-primary" id="btn-connect">Anslut till ZipLink</button>
  </div>

  <!-- Write form (shown after auth) -->
  <div id="section-write" class="hidden">
    <hr class="divider">

    <div class="field">
      <label>Port / Lås</label>
      <div class="port-group">
        <button class="port-btn active" data-port="1">Port 1</button>
        <button class="port-btn" data-port="2">Port 2</button>
        <button class="port-btn" data-port="3">Port 3</button>
      </div>
    </div>

    <div class="field">
      <label>Giltig till</label>
      <div class="date-row">
        <input type="date" id="expiry-date">
        <input type="time" id="expiry-time" value="23:59">
      </div>
    </div>

    <!-- Status steps -->
    <div class="steps" id="steps">
      <div class="step" id="s-cmd"><div class="step-icon" id="i-cmd">1</div><span>Skickar kommando</span></div>
      <div class="step" id="s-wait"><div class="step-icon" id="i-wait">2</div><span>Väntar på kort</span></div>
      <div class="step" id="s-write"><div class="step-icon" id="i-write">3</div><span>Skriver credential</span></div>
      <div class="step" id="s-verify"><div class="step-icon" id="i-verify">4</div><span>Verifierar</span></div>
    </div>

    <div id="result-box" class="result-box"></div>

    <button class="btn-primary" id="btn-write">Skriv till kort</button>
    <button class="btn-secondary" id="btn-disconnect">Koppla från</button>
  </div>

</div>

<script>
// ── BLE UUIDs ─────────────────────────────────────────────────────────────────
const DEVICE_NAME   = 'ZipLink';
const SVC_UUID      = '6e400021-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_CHALLENGE = '6e400022-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_AUTH      = '6e400023-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_CMD       = '6e400024-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_STATUS    = '6e400025-b5a3-f393-e0a9-e50e24dcca9e';

// ── State ─────────────────────────────────────────────────────────────────────
let bleDevice  = null;
let bleServer  = null;
let chrCmdRef  = null;
let selectedPort = 1;
let writeInProgress = false;

// ── Default expiry = 1 year from today ───────────────────────────────────────
const d = new Date();
d.setFullYear(d.getFullYear() + 1);
document.getElementById('expiry-date').value = d.toISOString().slice(0, 10);

// ── Port selector ─────────────────────────────────────────────────────────────
document.querySelectorAll('.port-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.port-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPort = parseInt(btn.dataset.port);
  });
});

// ── Crypto helpers ────────────────────────────────────────────────────────────
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function computeHMAC(keyStr, messageStr) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(keyStr),
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  return new Uint8Array(await crypto.subtle.sign('HMAC', key, enc.encode(messageStr)));
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function stepActive(id) {
  const s = document.getElementById('s-' + id);
  const i = document.getElementById('i-' + id);
  s.className = 'step active';
  i.innerHTML = '<div class="spinner"></div>';
}
function stepDone(id) {
  document.getElementById('s-' + id).className = 'step done';
  document.getElementById('i-' + id).textContent = '✓';
}
function stepError(id) {
  document.getElementById('s-' + id).className = 'step error';
  document.getElementById('i-' + id).textContent = '✕';
}
function stepReset(id, num) {
  document.getElementById('s-' + id).className = 'step';
  document.getElementById('i-' + id).textContent = num;
}
function showResult(type, html) {
  const box = document.getElementById('result-box');
  box.className = 'result-box ' + type;
  box.innerHTML = html;
  box.style.display = 'block';
}
function hideResult() {
  document.getElementById('result-box').style.display = 'none';
}
function resetSteps() {
  [['cmd',1],['wait',2],['write',3],['verify',4]].forEach(([id, n]) => stepReset(id, n));
  document.getElementById('steps').style.display = 'none';
  hideResult();
}

// ── Connect ───────────────────────────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', async () => {
  const key = document.getElementById('key-input').value.trim();
  if (!key) { alert('Ange nyckeln för att ansluta.'); return; }

  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.textContent = 'Ansluter…';

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SVC_UUID],
    });
    bleServer = await bleDevice.gatt.connect();
    const service = await bleServer.getPrimaryService(SVC_UUID);

    const chrChallenge = await service.getCharacteristic(CHR_CHALLENGE);
    const chrAuth      = await service.getCharacteristic(CHR_AUTH);
    chrCmdRef          = await service.getCharacteristic(CHR_CMD);
    const chrStatus    = await service.getCharacteristic(CHR_STATUS);

    // Read nonce (ESP32 writes it on connect; give it 1.5 s)
    await new Promise(r => setTimeout(r, 1500));
    const nonce = new Uint8Array((await chrChallenge.readValue()).buffer);
    if (nonce.length !== 16) throw new Error('Oväntad nonce-längd');

    const hmac = await computeHMAC(key, bytesToHex(nonce));
    await chrAuth.writeValueWithResponse(hmac);
    await new Promise(r => setTimeout(r, 500));

    // Subscribe to status notifications
    await chrStatus.startNotifications();
    chrStatus.addEventListener('characteristicvaluechanged', onStatus);

    bleDevice.addEventListener('gattserverdisconnected', onDisconnect);
    showConnected();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Anslut till ZipLink';
    if (err.name !== 'NotFoundError' && err.name !== 'NotAllowedError') {
      alert('Anslutning misslyckades: ' + err.message);
    }
  }
});

function showConnected() {
  document.getElementById('section-connect').classList.add('hidden');
  document.getElementById('section-write').classList.remove('hidden');
  document.getElementById('conn-badge').classList.remove('hidden');
  document.getElementById('key-input').disabled = true;
}

function onDisconnect() {
  bleServer = null;
  chrCmdRef = null;
  writeInProgress = false;
  document.getElementById('section-connect').classList.remove('hidden');
  document.getElementById('section-write').classList.add('hidden');
  document.getElementById('conn-badge').classList.add('hidden');
  document.getElementById('key-input').disabled = false;
  document.getElementById('btn-connect').disabled = false;
  document.getElementById('btn-connect').textContent = 'Anslut till ZipLink';
  resetSteps();
}

document.getElementById('btn-disconnect').addEventListener('click', () => {
  if (bleServer) bleServer.disconnect();
});

// ── Write ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-write').addEventListener('click', async () => {
  if (!chrCmdRef || writeInProgress) return;

  const dateVal = document.getElementById('expiry-date').value;
  const timeVal = document.getElementById('expiry-time').value;
  if (!dateVal || !timeVal) { alert('Ange datum och tid.'); return; }

  const expiry = dateVal.replace(/-/g, '') + timeVal.replace(':', '') + '00'; // YYYYMMDDHHMMSS
  if (expiry.length !== 14 || !/^\d{14}$/.test(expiry)) {
    alert('Ogiltigt datum/tid-format.');
    return;
  }

  writeInProgress = true;
  document.getElementById('btn-write').disabled = true;
  resetSteps();
  document.getElementById('steps').style.display = 'block';

  stepActive('cmd');
  try {
    const cmd = new Uint8Array(15);
    cmd[0] = selectedPort;
    cmd.set(new TextEncoder().encode(expiry).slice(0, 14), 1);
    await chrCmdRef.writeValueWithResponse(cmd);
    stepDone('cmd');
    stepActive('wait');
  } catch (err) {
    stepError('cmd');
    showResult('error', 'Kunde inte skicka kommando: ' + err.message);
    writeInProgress = false;
    document.getElementById('btn-write').disabled = false;
  }
});

// ── Status notifications ──────────────────────────────────────────────────────
function onStatus(event) {
  const bytes = new Uint8Array(event.target.value.buffer);
  const code  = bytes[0];

  if (code === 0x01) {                         // waiting for card
    stepActive('wait');
  } else if (code === 0x02) {                  // card detected
    stepDone('wait');
    stepActive('write');
  } else if (code === 0x03) {                  // writing
    stepDone('write');
    stepActive('verify');
  } else if (code === 0x10) {                  // success
    stepDone('verify');
    const ctNames = { 1: 'Mifare Classic 1K', 2: 'Mifare Classic 4K', 3: 'NTAG / Ultralight' };
    const ct  = ctNames[bytes[1]] || 'Okänd typ';
    const uid = Array.from(bytes.slice(2)).map(b => b.toString(16).padStart(2,'0')).join(':').toUpperCase();
    showResult('success',
      `<strong>Kortet är programmerat!</strong><br>` +
      `Port ${selectedPort} · Typ: ${ct}` +
      `<div class="uid-display">UID: ${uid}</div>`
    );
    writeInProgress = false;
    document.getElementById('btn-write').disabled = false;
  } else {
    // Error
    const errorMessages = {
      0xF0: 'Inget kort detekterades inom tidsgränsen.',
      0xF1: 'Skrivning till kortet misslyckades.',
      0xF2: 'Korttypen stöds inte (SAK okänd).',
      0xF3: 'Verifiering misslyckades — credential kunde inte läsas tillbaka.',
      0xF5: 'PN532-läsaren svarade inte.',
    };
    const activeStep = ['cmd','wait','write','verify'].find(
      id => document.getElementById('s-'+id).classList.contains('active')
    );
    if (activeStep) stepError(activeStep);
    showResult('error', errorMessages[code] || `Okänt fel (0x${code.toString(16)})`);
    writeInProgress = false;
    document.getElementById('btn-write').disabled = false;
  }
}
</script>
</body>
</html>
