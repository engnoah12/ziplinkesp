<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ZipLink — Uppdatering</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #1d1d1f;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6e6e73;
    margin-bottom: 36px;
  }

  #btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: #0071e3;
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #btn:hover { background: #0077ed; }
  #btn:active { background: #006cce; }
  #btn:disabled { opacity: 0.45; cursor: default; }

  .steps {
    margin-top: 28px;
    text-align: left;
    display: none;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 15px;
    color: #6e6e73;
    border-bottom: 1px solid #f0f0f0;
    transition: color 0.3s;
  }
  .step:last-child { border-bottom: none; }
  .step.active  { color: #1d1d1f; font-weight: 500; }
  .step.done    { color: #34c759; }
  .step.error   { color: #ff3b30; }

  .icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    background: #f0f0f0;
    color: #aeaeb2;
    transition: background 0.3s, color 0.3s;
  }
  .step.active .icon  { background: #e8f0fe; color: #0071e3; }
  .step.done   .icon  { background: #e9f9ee; color: #34c759; }
  .step.error  .icon  { background: #ffeeed; color: #ff3b30; }

  .error-msg {
    margin-top: 20px;
    padding: 14px;
    background: #fff2f2;
    border-radius: 10px;
    font-size: 14px;
    color: #ff3b30;
    display: none;
    text-align: left;
    line-height: 1.5;
  }

  .success-msg {
    margin-top: 20px;
    padding: 14px;
    background: #f0faf4;
    border-radius: 10px;
    font-size: 14px;
    color: #34c759;
    display: none;
    text-align: center;
    font-weight: 500;
    line-height: 1.5;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid #0071e3;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ZipLink</div>
  <div class="subtitle">Mjukvaruuppdatering</div>

  <button id="btn">Starta uppdatering</button>

  <div class="steps" id="steps">
    <div class="step" id="s-connect">
      <div class="icon" id="i-connect">1</div>
      <span>Ansluter till enhet</span>
    </div>
    <div class="step" id="s-auth">
      <div class="icon" id="i-auth">2</div>
      <span>Autentiserar</span>
    </div>
    <div class="step" id="s-upload">
      <div class="icon" id="i-upload">3</div>
      <span id="upload-label">Laddar upp filer</span>
    </div>
    <div class="step" id="s-done">
      <div class="icon" id="i-done">4</div>
      <span>Startar om enheten</span>
    </div>
  </div>

  <div class="error-msg"   id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
</div>

<script>
// ── Configuration (generated by bundle_update.py) ─────────────────────────────
const HASH_KEY_UPD = '__KEY__';
const FILES = __FILES__;
// ─────────────────────────────────────────────────────────────────────────────

const DEVICE_NAME   = 'ZipLink';
const SVC_UUID      = '6e400011-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_CHALLENGE = '6e400012-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_AUTH      = '6e400013-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_FILENAME  = '6e400014-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_DATA      = '6e400015-b5a3-f393-e0a9-e50e24dcca9e';
const CHR_COMMIT    = '6e400016-b5a3-f393-e0a9-e50e24dcca9e';
const CHUNK_SIZE    = 200;
const CMD_COMMIT    = new Uint8Array([0x01]);
const CMD_REBOOT    = new Uint8Array([0x03]);

// ── UI helpers ────────────────────────────────────────────────────────────────

function stepActive(id) {
  document.getElementById('s-' + id).className = 'step active';
  document.getElementById('i-' + id).innerHTML = '<div class="spinner"></div>';
}
function stepDone(id) {
  document.getElementById('s-' + id).className = 'step done';
  document.getElementById('i-' + id).textContent = '✓';
}
function stepError(id) {
  document.getElementById('s-' + id).className = 'step error';
  document.getElementById('i-' + id).textContent = '✕';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Crypto helpers (Web Crypto API) ──────────────────────────────────────────

async function sha256(data) {
  const hash = await crypto.subtle.digest('SHA-256', data);
  return new Uint8Array(hash);
}

async function computeHMAC(keyStr, messageStr) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(keyStr),
    { name: 'HMAC', hash: 'SHA-256' },
    false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(messageStr));
  return new Uint8Array(sig);
}

function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Main update flow ──────────────────────────────────────────────────────────

document.getElementById('btn').addEventListener('click', async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('steps').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';

  let server, service;

  try {
    // Step 1: connect
    stepActive('connect');
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SVC_UUID],
    });
    server  = await device.gatt.connect();
    service = await server.getPrimaryService(SVC_UUID);
    stepDone('connect');

    // Step 2: read nonce + authenticate
    stepActive('auth');
    const chrChallenge = await service.getCharacteristic(CHR_CHALLENGE);
    const chrAuth      = await service.getCharacteristic(CHR_AUTH);

    // Give ESP32 500 ms to generate and write the nonce before we read it
    await new Promise(r => setTimeout(r, 1500));
    const nonceVal = await chrChallenge.readValue();
    const nonce    = new Uint8Array(nonceVal.buffer);
    if (nonce.length !== 16) throw new Error(`Oväntad nonce-längd: ${nonce.length}`);

    const hmac = await computeHMAC(HASH_KEY_UPD, bytesToHex(nonce));
    await chrAuth.writeValueWithResponse(hmac);
    // Give ESP32 time to verify before we start sending files
    await new Promise(r => setTimeout(r, 500));
    stepDone('auth');

    // Step 3: upload files
    stepActive('upload');
    const chrFilename = await service.getCharacteristic(CHR_FILENAME);
    const chrData     = await service.getCharacteristic(CHR_DATA);
    const chrCommit   = await service.getCharacteristic(CHR_COMMIT);
    const enc         = new TextEncoder();

    for (let i = 0; i < FILES.length; i++) {
      const { name, content } = FILES[i];
      const isLast = i === FILES.length - 1;

      document.getElementById('upload-label').textContent =
        `Laddar upp fil ${i + 1} / ${FILES.length}`;

      await chrFilename.writeValueWithResponse(enc.encode(name));

      const bytes = enc.encode(content);
      for (let offset = 0; offset < bytes.length; offset += CHUNK_SIZE) {
        await chrData.writeValueWithResponse(bytes.slice(offset, offset + CHUNK_SIZE));
      }

      // Commit: [cmd_byte (1)] + [SHA256 of file (32)] = 33 bytes
      const hash = await sha256(bytes);
      const commitData = new Uint8Array(33);
      commitData[0] = isLast ? 0x03 : 0x01;
      commitData.set(hash, 1);
      await chrCommit.writeValueWithResponse(commitData);
      await new Promise(r => setTimeout(r, 300));
    }

    document.getElementById('upload-label').textContent = 'Filer uppladdade';
    stepDone('upload');

    // Step 4: rebooting (connection will drop naturally)
    stepActive('done');
    await new Promise(r => setTimeout(r, 2000));
    stepDone('done');
    showSuccess('Uppdateringen är klar!\nEnheten startar om med ny programvara.');

  } catch (err) {
    // Determine which step failed and mark it
    const steps = ['connect', 'auth', 'upload', 'done'];
    const active = steps.find(s =>
      document.getElementById('s-' + s).classList.contains('active')
    );
    if (active) stepError(active);

    if (err.name === 'NotFoundError' || err.name === 'NotAllowedError') {
      showError('Ingen enhet valdes. Tryck på "Starta uppdatering" och välj ZipLink i listan.');
    } else if (err.message?.includes('nonce')) {
      showError('Kunde inte läsa utmaningsvärde från enheten. Försök igen.');
    } else {
      showError('Något gick fel: ' + err.message + '\nFörsök igen eller kontakta support.');
    }

    btn.disabled = false;
    if (server?.connected) server.disconnect();
  }
});
</script>
</body>
</html>
